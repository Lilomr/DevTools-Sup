<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevTools-Sup</title>
    <link rel="stylesheet" href="/Estilizacao/TesteP.css">
</head>

<body>
    <a href="/"><svg width="40px" height="40px" viewBox="0 0 16 16" version="1.1" xmlns="http://www.w3.org/2000/svg"
            xmlns:xlink="http://www.w3.org/1999/xlink">
            <path fill="#e3fc07" d="M8 1.4l-2 1.3v-1.7h-2v3l-4 2.6 0.6 0.8 7.4-4.8 7.4 4.8 0.6-0.8z"></path>
            <path fill="#fc7507" d="M8 4l-6 4v7h5v-3h2v3h5v-7z"></path>
        </svg></a>

    <div class="container">
        <h1 id="titulo">Teste de Portas</h1>

        <h2 id="MeuIp">Seu Ip: {{meuIp}}</h2>
        <form action="/porta" method="post">
            <label for="ip">Servidor: </label>
            <input type="text" id="ip" name="ip" value="{{ip}}" required>
            <br></br>
            <div class="porta">
                <label for="porta">Porta:</label>
                <input max="65535" min="0" type="number" id="porta" value="{{porta}}" name="porta" required>
            </div>
            <br></br>
            <div class="botaoEnviar">
                <b><button>Testar</button></b>
            </div>
            <br></br>
        </form>
        {% if status and color %}
        <div class="status">
            <h3>Porta: <b>{{porta}}</b> <span style="color:{{ color }};">{{status}}</span> para o Servidor:
                <b>{{ip}}</b>
            </h3>
            {% if ip2 not in ip %}
            <h3><b>{{ip2}}</b></h3>
            {% endif %}
        </div>
        {% elif status %}
        <div class="status">
            <h3>{{status}}</h3>
        </div>
        {% endif %}
    </div>

</body>

</html>
