<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="/Estilizacao/TesteP.css">
</head>
<body>

    <div class="container">

        <h1 id="titulo">Teste de Portas</h1>
        
        <h2 id="MeuIp" >Seu Ip: {{meuIp}}</h2>
        <form action="/porta" method="post">
            <label for="ip">Ip:</label>
            <input type="text" id="ip" name="ip" style=" color: black;" value="{{ip}}" required>
            <br></br>
            <div class="porta">
                <label for="porta">Porta:</label>
                <input type="number" id="porta" value="{{porta}}" style=" color: black;" name="porta" required>
            </div>
            <br></br>
            <div class="botaoEnviar">
                <input id="botaoEnviar" type="submit" value="Enviar">    
            </div>
            
            <div class="status">
                <h1 >{{status}}</h1>
            </div>
        </form>
    </div>
        
</body>
</html>
